<script type="text/html" data-help-name="llama-cpp">
  <p>Lance <b>llama-server</b> (llama.cpp) comme processus enfant et expose l'inférence LLM dans un flow Node-RED. Trois modes disponibles, deux sorties.</p>

  <!-- ═══════════════════════════════════════════════════ -->
  <h3>Modes</h3>

  <h4>completion <small>(défaut)</small></h4>
  <p>Utilise l'endpoint <code>/completion</code> de llama-server. Idéal pour les inférences simples sans historique de conversation.</p>

  <h4>chat</h4>
  <p>Utilise <code>/v1/chat/completions</code> (format OpenAI). Active <code>--jinja</code> automatiquement au démarrage. Permet :</p>
  <ul>
    <li>Conversations multi-tours via un tableau <code>messages[]</code></li>
    <li>Accès direct par tout client MCP/OpenAI externe sur <code>http://127.0.0.1:&lt;port&gt;/v1/chat/completions</code></li>
  </ul>

  <h4>mcp-client</h4>
  <p>Orchestre une boucle d'appels d'outils. Le nœud gère automatiquement les allers-retours entre le LLM et les outils jusqu'à obtenir une réponse texte finale.</p>

  <!-- ═══════════════════════════════════════════════════ -->
  <h3>Entrées</h3>

  <h4>Mode completion / chat — message standard</h4>
  <dl class="message-properties">
    <dt>payload <span class="property-type">string</span></dt>
    <dd>Prompt utilisateur. Transformé en <code>### Human: … ### Assistant:</code> (completion) ou en <code>messages[{role:"user"}]</code> (chat).</dd>
    <dt>payload <span class="property-type">array</span></dt>
    <dd><b>Mode chat uniquement.</b> Tableau <code>[{role, content}, …]</code> — passé directement à l'API sans modification.</dd>
    <dt>payload.messages <span class="property-type">array</span></dt>
    <dd><b>Mode chat uniquement.</b> Objet avec clé <code>messages</code> contenant le tableau.</dd>
  </dl>

  <h4>Mode mcp-client — message initial</h4>
  <dl class="message-properties">
    <dt>payload <span class="property-type">string | array</span></dt>
    <dd>Prompt ou tableau <code>messages[]</code>, identique au mode chat.</dd>
    <dt>tools <span class="property-type">array</span></dt>
    <dd>Définitions des outils au format OpenAI :
<pre>[{
  "type": "function",
  "function": {
    "name": "get_temperature",
    "description": "Lire un capteur",
    "parameters": {
      "type": "object",
      "properties": {
        "sensor_id": { "type": "string" }
      },
      "required": ["sensor_id"]
    }
  }
}]</pre>
    </dd>
  </dl>

  <h4>Mode mcp-client — résultat d'outil</h4>
  <p>Après avoir reçu un <code>tool_call</code> sur la sortie 2, renvoyer sur l'entrée :</p>
  <dl class="message-properties">
    <dt>topic <span class="property-type">string</span></dt>
    <dd>Doit valoir <code>"tool_result"</code></dd>
    <dt>payload.taskId <span class="property-type">string</span></dt>
    <dd>Identifiant de la tâche reçu dans le <code>tool_call</code> — permet au nœud de reprendre la bonne conversation.</dd>
    <dt>payload.results <span class="property-type">array</span></dt>
    <dd>Résultats des outils :
<pre>[{
  "tool_call_id": "call_abc123",
  "content": "22.5"
}]</pre>
    </dd>
  </dl>

  <h4>Messages de contrôle (tous modes)</h4>
  <dl class="message-properties">
    <dt>topic = "debug" <span class="property-type"></span></dt>
    <dd>Émet la configuration complète (commande de spawn, arguments, sampling) sur la sortie 2, sans lancer d'inférence.</dd>
    <dt>topic = "trace", payload = true/false <span class="property-type"></span></dt>
    <dd>Active ou désactive à chaud l'affichage des logs <code>[llama-server:port]</code> dans le panneau Debug. Inutile de redéployer.</dd>
  </dl>

  <!-- ═══════════════════════════════════════════════════ -->
  <h3>Sorties</h3>

  <h4>Sortie 1 — réponse LLM</h4>
  <dl class="message-properties">
    <dt>payload <span class="property-type">string</span></dt>
    <dd>Réponse textuelle générée par le modèle (trimée).</dd>
    <dt>messages <span class="property-type">array</span></dt>
    <dd><b>Modes chat et mcp-client.</b> Historique complet de la conversation incluant la réponse, utilisable directement pour le tour suivant.</dd>
  </dl>

  <h4>Sortie 2 — debug / timing / tool_call</h4>
  <dl class="message-properties">
    <dt>topic = "timing" <span class="property-type"></span></dt>
    <dd>Émis après chaque inférence, parsé depuis les logs de llama-server :
<pre>{
  "promptEvalMs": 53624,
  "promptTokens": 209,
  "promptTokensPerSec": 3.90,
  "evalMs": 9399,
  "evalTokens": 33,
  "evalTokensPerSec": 3.51,
  "totalMs": 63024,
  "totalTokens": 242,
  "port": 8082,
  "raw": "… logs bruts …"
}</pre>
    </dd>
    <dt>topic = "tool_call" <span class="property-type"></span></dt>
    <dd><b>Mode mcp-client.</b> Le LLM demande l'exécution d'un ou plusieurs outils :
<pre>{
  "taskId": "1714000000000-abc",
  "tool_calls": [{
    "id": "call_abc123",
    "type": "function",
    "function": {
      "name": "get_temperature",
      "arguments": "{\"sensor_id\": \"salon\"}"
    }
  }]
}</pre>
    Renvoyer les résultats sur l'entrée avec <code>msg.topic = "tool_result"</code>.</dd>
    <dt>topic = "debug" <span class="property-type"></span></dt>
    <dd>Émis au démarrage du serveur ou sur demande (<code>msg.topic = "debug"</code>) :
<pre>{
  "message": "server ready",
  "mode": "chat",
  "command": "llama-server --model /path/model.gguf --port 8082 …",
  "args": […],
  "samplingDefaults": { "temperature": 0.8, … },
  "port": 8082
}</pre>
    </dd>
  </dl>

  <!-- ═══════════════════════════════════════════════════ -->
  <h3>Paramètres de configuration</h3>

  <h4>Modèle</h4>
  <dl class="message-properties">
    <dt>Chemin modèle <span class="property-type">requis</span></dt>
    <dd>Chemin absolu vers le fichier <code>.gguf</code>.</dd>
    <dt>Binaire</dt>
    <dd>Nom ou chemin de l'exécutable <code>llama-server</code>. Si non présent dans <code>$PATH</code>, mettre le chemin complet, ex: <code>/opt/llama.cpp/llama-server</code>.</dd>
    <dt>Alias</dt>
    <dd>Nom du modèle exposé dans l'API (<code>--alias</code>). Utile quand un client MCP externe interroge le champ <code>model</code>.</dd>
  </dl>

  <h4>Serveur</h4>
  <dl class="message-properties">
    <dt>Port <span class="property-type">défaut: 8080</span></dt>
    <dd>Chaque nœud doit avoir un port unique. Un nœud ne démarrera pas si le port est déjà occupé.</dd>
    <dt>Host <span class="property-type">défaut: 127.0.0.1</span></dt>
    <dd>Interface réseau d'écoute. Garder <code>127.0.0.1</code> sauf si accès réseau externe requis.</dd>
    <dt>Slots parallèles (-np) <span class="property-type">défaut: 1</span></dt>
    <dd>Nombre de requêtes simultanées. Chaque slot charge une copie du contexte en mémoire. Sur SBC, laisser à 1.</dd>
    <dt>Continuous batching (-cb) <span class="property-type">défaut: activé</span></dt>
    <dd>Améliore le débit quand plusieurs slots sont actifs. Sans effet avec 1 slot.</dd>
    <dt>Flash Attention (-fa)</dt>
    <dd>Réduit la consommation mémoire KV-cache pour les grands contextes. Désactivé si le backend GPU ne le supporte pas.</dd>
    <dt>mlock</dt>
    <dd>Verrouille le modèle en RAM — empêche le swap. Nécessite des droits suffisants (<code>ulimit -l unlimited</code>).</dd>
    <dt>Désactiver mmap</dt>
    <dd>Charge le modèle entièrement en RAM au lieu d'utiliser mmap. Plus rapide en inférence, mais le démarrage est plus lent.</dd>
    <dt>Pas de warmup</dt>
    <dd>Saute la passe d'échauffement au démarrage (<code>--no-warmup</code>). Démarre plus vite, première inférence potentiellement plus lente.</dd>
  </dl>

  <h4>Contexte</h4>
  <dl class="message-properties">
    <dt>Context (-c) <span class="property-type">défaut: 2048</span></dt>
    <dd>Taille de la fenêtre de contexte en tokens. Valeur 0 = utiliser la valeur du modèle GGUF. Plus le contexte est grand, plus la RAM nécessaire est importante.</dd>
    <dt>Batch size (-b) <span class="property-type">défaut: 512</span></dt>
    <dd>Nombre de tokens traités en parallèle lors du prefill (traitement du prompt). Augmenter améliore la vitesse de prefill au prix de RAM.</dd>
    <dt>μBatch size (-ub) <span class="property-type">défaut: 512</span></dt>
    <dd>Taille du micro-batch physique. Doit être ≤ batch size. Sur SBC, réduire à 128-256 peut améliorer la stabilité.</dd>
    <dt>Désactiver context shift</dt>
    <dd>Par défaut, quand le contexte est plein, les tokens les plus anciens sont supprimés. Cette option désactive ce comportement — la génération s'arrête quand le contexte est plein.</dd>
  </dl>

  <h4>CPU / Threads</h4>
  <dl class="message-properties">
    <dt>Threads inférence <span class="property-type">défaut: -1 (auto)</span></dt>
    <dd>Nombre de threads CPU pour la génération token par token. <code>-1</code> = détection automatique. Sur Radxa Dragon Q6A (8 cœurs), essayer 4 à 6.</dd>
    <dt>Threads batch <span class="property-type">défaut: -1 (auto)</span></dt>
    <dd>Threads CPU pour le traitement du prompt (prefill). Peut être différent des threads d'inférence. <code>-1</code> = identique aux threads d'inférence.</dd>
  </dl>

  <h4>GPU</h4>
  <dl class="message-properties">
    <dt>GPU layers (-ngl) <span class="property-type">défaut: 0</span></dt>
    <dd>Nombre de couches du modèle déchargées sur GPU. <code>0</code> = CPU uniquement. <code>-1</code> = tout sur GPU. Nécessite un build llama.cpp avec support GPU (CUDA, Vulkan, Metal). Non envoyé si 0.</dd>
    <dt>Split mode</dt>
    <dd>Stratégie de répartition sur plusieurs GPU : <code>none</code>, <code>layer</code> (par couche) ou <code>row</code> (par ligne de tenseur). Ignoré si 1 seul GPU.</dd>
    <dt>GPU principal</dt>
    <dd>Index du GPU principal pour le calcul (<code>--main-gpu</code>). Non envoyé si vide ou 0.</dd>
    <dt>Tensor split</dt>
    <dd>Proportions de mémoire GPU allouées par GPU, ex: <code>3,1</code> pour 75%/25%. Multi-GPU uniquement.</dd>
  </dl>

  <h4>Sampling (défauts par requête)</h4>
  <dl class="message-properties">
    <dt>Max tokens <span class="property-type">défaut: 512</span></dt>
    <dd>Nombre maximum de tokens générés par réponse (<code>n_predict</code>).</dd>
    <dt>Temperature <span class="property-type">défaut: 0.8</span></dt>
    <dd>Créativité de la génération. <code>0</code> = déterministe (toujours le token le plus probable). <code>1</code>+ = plus aléatoire.</dd>
    <dt>Top-K <span class="property-type">défaut: 40</span></dt>
    <dd>Limite la sélection aux K tokens les plus probables. <code>0</code> = désactivé.</dd>
    <dt>Top-P <span class="property-type">défaut: 0.95</span></dt>
    <dd>Nucleus sampling : sélectionne parmi les tokens couvrant P% de la probabilité cumulée. <code>1.0</code> = désactivé.</dd>
    <dt>Min-P <span class="property-type">défaut: 0.05</span></dt>
    <dd>Filtre les tokens dont la probabilité est inférieure à P × (prob. du token le plus probable). <code>0</code> = désactivé.</dd>
    <dt>Repeat penalty <span class="property-type">défaut: 1.1</span></dt>
    <dd>Pénalise la répétition des tokens déjà générés. <code>1.0</code> = aucune pénalité.</dd>
    <dt>Repeat last N <span class="property-type">défaut: 64</span></dt>
    <dd>Fenêtre de tokens considérés pour la pénalité de répétition. <code>0</code> = désactivé.</dd>
    <dt>Seed <span class="property-type">défaut: -1</span></dt>
    <dd>Graine aléatoire pour la reproductibilité. <code>-1</code> = aléatoire. Non envoyé si -1.</dd>
    <dt>Mirostat <span class="property-type">défaut: désactivé</span></dt>
    <dd>Algorithme de sampling adaptatif maintenant une perplexité cible. <code>v1</code> ou <code>v2</code>. Remplace Top-K/Top-P quand activé.</dd>
    <dt>Mirostat τ (tau) <span class="property-type">défaut: 5.0</span></dt>
    <dd>Entropie cible de Mirostat. Valeurs plus élevées = sorties plus diversifiées.</dd>
    <dt>Mirostat η (eta) <span class="property-type">défaut: 0.1</span></dt>
    <dd>Vitesse d'apprentissage de Mirostat. Contrôle la rapidité d'adaptation au texte généré.</dd>
  </dl>

  <h4>Chat / Prompt</h4>
  <dl class="message-properties">
    <dt>Chat template</dt>
    <dd>Format de conversation du modèle. Laisser vide pour lire depuis les métadonnées GGUF (recommandé). Forcer manuellement uniquement si le modèle ne contient pas de template ou si le template auto est incorrect. Templates disponibles : <code>chatml</code>, <code>llama3</code>, <code>llama2</code>, <code>llama4</code>, <code>phi3</code>, <code>phi4</code>, <code>gemma</code>, <code>mistral-v3</code>, <code>mistral-v7</code>, <code>deepseek3</code>, <code>command-r</code>, <code>vicuna</code>, <code>zephyr</code>…</dd>
    <dt>System prompt</dt>
    <dd>Instructions système injectées au début de chaque conversation. En mode <code>completion</code>, préfixe le prompt avec <code>### System:</code>. En modes <code>chat</code> et <code>mcp-client</code>, inséré comme message <code>{role: "system"}</code>. Ignoré si <code>msg.payload</code> est déjà un tableau <code>messages[]</code>.</dd>
  </dl>

  <h4>Debug</h4>
  <dl class="message-properties">
    <dt>Activer les traces</dt>
    <dd>Envoie chaque ligne de stdout/stderr de llama-server dans le panneau Debug Node-RED sous la forme <code>[llama-server:port] …</code>. Utile pour diagnostiquer les problèmes de démarrage ou analyser le comportement interne (cache, slots, sampler chain). Désactiver en production — génère beaucoup de messages. Aussi contrôlable à chaud via <code>msg.topic = "trace"</code>.</dd>
  </dl>

  <!-- ═══════════════════════════════════════════════════ -->
  <h3>Comportements automatiques</h3>
  <ul>
    <li><b>Démarrage au deploy</b> — le serveur démarre immédiatement sans attendre un premier message.</li>
    <li><b>File d'attente</b> — les messages reçus pendant le chargement du modèle sont mis en file et traités dans l'ordre dès que le serveur est prêt.</li>
    <li><b>Détection de port occupé</b> — si le port est déjà utilisé, le nœud affiche une erreur claire et ne démarre pas.</li>
    <li><b>Arrêt propre</b> — au redéploiement, SIGTERM est envoyé au processus, suivi de SIGKILL après 3 secondes si nécessaire.</li>
    <li><b>Timing automatique</b> — les métriques de performance sont parsées depuis les logs et émises sur la sortie 2 après chaque inférence, même sans traces activées.</li>
  </ul>

  <!-- ═══════════════════════════════════════════════════ -->
  <h3>Exemple flow mcp-client</h3>
  <pre>
[inject prompt + tools]
  → [llama-cpp (mcp-client)]
       sortie 1 → [traiter réponse finale]
       sortie 2 → [switch topic]
                    "tool_call" → [exécuter outil]
                                  → [construire tool_result]
                                  → [entrée llama-cpp]
                    "timing"    → [dashboard perf]
                    "debug"     → [log]
  </pre>
</script>
